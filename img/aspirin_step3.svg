<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="260" viewBox="0 0 1050 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#222"/></marker>
    <style>.box{fill:#fafafa;stroke:#d7dce2;stroke-width:1.3}.arrow{stroke:#222;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.label{font-family:Arial,sans-serif;font-size:20px;fill:#111}.small{font-family:Arial,sans-serif;font-size:14px;fill:#333}.title{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#111}</style>
  </defs>
  <text x="30" y="35" class="title">Step 3: The tetrahedral intermediate collapses and acetic acid leaves</text>
  <rect x="55" y="75" width="310" height="120" rx="8" class="box"/>
  <text x="82" y="125" class="label">Ar-O-C(OH)(CH3)-OCOCH3</text>
  <text x="122" y="165" class="small">tetrahedral intermediate</text>
  <line x1="400" y1="135" x2="590" y2="135" class="arrow"/>
  <text x="435" y="108" class="small">C=O reforms</text>
  <text x="424" y="164" class="small">acetate leaves</text>
  <rect x="625" y="75" width="210" height="120" rx="8" class="box"/>
  <text x="652" y="128" class="label">Ar-O-C(=O)CH3H+</text>
  <text x="662" y="165" class="small">protonated aspirin</text>
  <text x="860" y="140" class="label">+ CH3COOH</text>
</svg>
