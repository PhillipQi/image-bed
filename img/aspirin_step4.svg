<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="260" viewBox="0 0 1050 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#222"/></marker>
    <style>.box{fill:#fafafa;stroke:#d7dce2;stroke-width:1.3}.arrow{stroke:#222;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.label{font-family:Arial,sans-serif;font-size:20px;fill:#111}.small{font-family:Arial,sans-serif;font-size:14px;fill:#333}.title{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#111}</style>
  </defs>
  <text x="30" y="35" class="title">Step 4: Deprotonation gives aspirin and regenerates the acid catalyst</text>
  <rect x="65" y="75" width="250" height="120" rx="8" class="box"/>
  <text x="88" y="130" class="label">o-AcO-C6H4-CO2H-H+</text>
  <text x="112" y="165" class="small">protonated aspirin</text>
  <line x1="350" y1="135" x2="540" y2="135" class="arrow"/>
  <text x="372" y="108" class="small">base removes H+</text>
  <rect x="575" y="75" width="230" height="120" rx="8" class="box"/>
  <text x="615" y="130" class="label">o-AcO-C6H4-CO2H</text>
  <text x="660" y="165" class="small">aspirin</text>
  <text x="835" y="140" class="label">+ H+</text>
  <text x="75" y="230" class="small">workup: excess acetic anhydride + H2O -> 2 CH3COOH</text>
</svg>
