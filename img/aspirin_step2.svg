<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="310" viewBox="0 0 1120 310">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#222"/></marker>
    <style>.box{fill:#fafafa;stroke:#d7dce2;stroke-width:1.3}.bond{stroke:#222;stroke-width:2.2;fill:none;stroke-linecap:round}.thin{stroke:#555;stroke-width:1.4;fill:none}.arrow{stroke:#222;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.label{font-family:Arial,sans-serif;font-size:20px;fill:#111}.small{font-family:Arial,sans-serif;font-size:14px;fill:#333}.title{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#111}</style>
  </defs>
  <text x="30" y="35" class="title">Step 2: Phenolic oxygen of salicylic acid attacks the activated acetyl group</text>
  <rect x="45" y="70" width="245" height="195" rx="8" class="box"/>
  <polygon points="105,112 135,129 135,163 105,180 75,163 75,129" class="bond"/>
  <circle cx="105" cy="146" r="18" class="thin"/>
  <line x1="135" y1="129" x2="172" y2="100" class="bond"/>
  <text x="178" y="104" class="label">COOH</text>
  <line x1="135" y1="163" x2="174" y2="198" class="bond"/>
  <text x="181" y="204" class="label">O-H</text>
  <text x="82" y="242" class="small">salicylic acid</text>

  <text x="315" y="154" class="label">+</text>
  <rect x="360" y="95" width="260" height="115" rx="8" class="box"/>
  <text x="382" y="150" class="label">CH3C(OH+)-O-COCH3</text>
  <text x="438" y="185" class="small">activated anhydride</text>

  <line x1="650" y1="152" x2="800" y2="152" class="arrow"/>
  <text x="665" y="124" class="small">O attacks C=O</text>

  <rect x="835" y="75" width="250" height="190" rx="8" class="box"/>
  <text x="865" y="135" class="label">Ar-O-C(OH)(CH3)</text>
  <text x="895" y="165" class="label">-OCOCH3</text>
  <text x="870" y="215" class="small">tetrahedral intermediate</text>
</svg>
